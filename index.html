<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Music Widget</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .player {
      width: 350px;
      background: #d8c3a5;
      border: 4px solid #4a3f35;
      box-shadow: 6px 6px 0 #4a3f35;
      padding: 16px;
      text-align: center;
    }

    .screen {
      background: #f5efe6;
      border: 3px solid #4a3f35;
      padding: 12px;
    }

    .pixel {
      font-size: 44px;
      animation: bounce 0.8s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-6px); }
    }

    .bars {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 10px 0;
      height: 24px;
      align-items: end;
    }

    .bar {
      width: 8px;
      background: #a3b18a;
      border: 2px solid #4a3f35;
      animation: equalizer 0.6s infinite alternate;
    }

    .bar:nth-child(2) { 
      animation-delay: 0.1s; 
      background: #c9ada7;
    }

    .bar:nth-child(3) { 
      animation-delay: 0.2s; 
      background: #b7b7a4;
    }

    .bar:nth-child(4) { 
      animation-delay: 0.3s; 
      background: #dda15e;
    }

    @keyframes equalizer {
      from { height: 6px; }
      to { height: 24px; }
    }

    h2 {
      font-size: 15px;
      margin: 8px 0 12px;
      color: #4a3f35;
    }

    input {
      width: 92%;
      padding: 8px;
      font-family: inherit;
      border: 3px solid #4a3f35;
      background: #fffaf0;
      color: #4a3f35;
      margin-bottom: 8px;
      outline: none;
    }

    input::placeholder {
      color: #8a7f72;
    }

    button {
      font-family: inherit;
      background: #c9ada7;
      color: #4a3f35;
      border: 3px solid #4a3f35;
      box-shadow: 3px 3px 0 #4a3f35;
      padding: 8px 14px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button:hover {
      background: #b7b7a4;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    iframe {
      width: 100%;
      height: 160px;
      border: 3px solid #4a3f35;
      background: #fffaf0;
    }

    .message {
      font-size: 12px;
      margin-top: 8px;
      color: #4a3f35;
    }
  </style>
</head>

<body>
  <div class="player">
    <div class="screen">
      <div class="pixel">🎧</div>

      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <h2>Pixel Music Player</h2>

      <input id="songInput" placeholder="Paste YouTube, YouTube Music, or Spotify link..." />
      <br />
      <button id="saveButton">Play for Everyone</button>

      <div id="playerArea" class="message">
        Loading shared song...
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJY955oaY_QCEw37nSGvtkzZzhmWCMIBU",
      authDomain: "notionmusic-5340b.firebaseapp.com",
      projectId: "notionmusic-5340b",
      storageBucket: "notionmusic-5340b.firebasestorage.app",
      messagingSenderId: "987813218940",
      appId: "1:987813218940:web:2ca53ee39284c9c473d7f9",
      measurementId: "G-H90ZGJY11H"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const input = document.getElementById("songInput");
    const playerArea = document.getElementById("playerArea");
    const saveButton = document.getElementById("saveButton");

    const songRef = doc(db, "widget", "currentSong");

    let currentUrl = null;

    function getYouTubeID(url) {
      try {
        const u = new URL(url);

        if (
          u.hostname.includes("youtube.com") ||
          u.hostname.includes("music.youtube.com")
        ) {
          return u.searchParams.get("v");
        }

        if (u.hostname.includes("youtu.be")) {
          return u.pathname.slice(1).split("?")[0];
        }
      } catch {
        return null;
      }

      return null;
    }

    function getSpotifyEmbed(url) {
      try {
        const u = new URL(url);

        if (!u.hostname.includes("spotify.com")) return null;

        return url
          .replace("https://open.spotify.com/", "https://open.spotify.com/embed/")
          .split("?")[0];
      } catch {
        return null;
      }
    }

    function playSong(url) {
      if (!url) {
        playerArea.innerHTML = "No shared song saved yet.";
        return;
      }

      const youtubeID = getYouTubeID(url);
      const spotifyEmbed = getSpotifyEmbed(url);

      if (youtubeID) {
        playerArea.innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${youtubeID}?autoplay=1&mute=1&controls=1"
            allow="autoplay; encrypted-media"
            allowfullscreen>
          </iframe>
          <div class="message">Playing from YouTube. Unmute manually if needed.</div>
        `;
        return;
      }

      if (spotifyEmbed) {
        playerArea.innerHTML = `
          <iframe
            src="${spotifyEmbed}"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
          </iframe>
          <div class="message">Playing from Spotify.</div>
        `;
        return;
      }

      playerArea.innerHTML = "Invalid link. Use YouTube, YouTube Music, or Spotify.";
    }

    saveButton.addEventListener("click", async () => {
      const url = input.value.trim();

      if (!url) {
        playerArea.innerHTML = "Please paste a song link.";
        return;
      }

      currentUrl = url;
      playSong(url);

      const status = document.createElement("div");
      status.className = "message";
      status.textContent = "Saving for everyone...";
      playerArea.appendChild(status);

      try {
        await setDoc(songRef, {
          url: url,
          updatedAt: new Date().toISOString()
        });

        status.textContent = "Saved for everyone!";
      } catch (error) {
        console.error(error);
        status.textContent = "Song played, but it did not save. Check Firebase rules.";
      }
    });

    onSnapshot(songRef, (snapshot) => {
      if (!snapshot.exists()) {
        playerArea.innerHTML = "No shared song saved yet.";
        return;
      }

      const data = snapshot.data();

      if (!data.url) return;

      input.value = data.url;

      if (data.url !== currentUrl) {
        currentUrl = data.url;
        playSong(data.url);
      }
    });
  </script>
</body>
</html>
